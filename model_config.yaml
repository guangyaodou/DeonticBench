# Model configuration for DeonticBench inference.
#
# reasoning_models: models that receive `reasoning_effort` and have `temperature` dropped.
# model_params: per-model API parameter overrides (temperature, top_p, max_tokens, etc.).
#
# To add a new reasoning model, append its name to `reasoning_models`.
# To add custom parameters, add an entry under `model_params`.

reasoning_models:
  - o3-2025-04-16
  - gemini-2.5-pro-preview-06-05
  - gpt-5-2025-08-07
  - gpt-5.1
  - gpt-5.1-2025-11-13
  - openai/gpt-5.1-2025-11-13
  - gpt-5.2-2025-12-11
  - moonshotai/kimi-k2-thinking
  - moonshotai/Kimi-K2-Thinking
  - Qwen/Qwen3-235B-A22B-Thinking-2507
  - openai/gpt-5.2-codex

model_params:
  Qwen/Qwen3-235B-A22B-Thinking-2507:
    temperature: 0.6
    top_p: 0.95
    max_tokens: 65536

  Qwen/Qwen3-235B-A22B-Instruct-2507-tput:
    temperature: 0.7
    top_p: 0.8
    max_tokens: 32768

  moonshotai/kimi-k2-thinking:
    temperature: 0.6
    top_p: 0.95

  moonshotai/Kimi-K2-Thinking:
    temperature: 0.6
    top_p: 0.95

  deepseek-ai/DeepSeek-R1-Distill-Qwen-32B:
    temperature: 0.7
    max_tokens: 32768
